name: Build & Deploy to WHC (Node.js)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (production)
        run: npm run build
        env:
          # Build-time public env vars (read by Next.js at build).
          # Server-only secrets stay in cPanel — never here.
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Stamp restart trigger with current timestamp
        # Force restart.txt content to change every run so FTP-Deploy-Action
        # actually uploads it (otherwise it's skipped as unchanged and
        # Phusion Passenger never reboots — site keeps serving old build).
        run: |
          mkdir -p .github/passenger-restart
          echo "Passenger restart trigger." > .github/passenger-restart/restart.txt
          echo "Deploy run: ${GITHUB_RUN_ID} / sha: ${GITHUB_SHA}" >> .github/passenger-restart/restart.txt
          echo "Stamped at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .github/passenger-restart/restart.txt
          cat .github/passenger-restart/restart.txt

      - name: Deploy to WHC via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Upload everything from repo root except things excluded below.
          local-dir: ./
          # Path on the WHC server where the cPanel Node.js app lives.
          # Change this in repo Settings → Secrets if your app root differs.
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          log-level: verbose
          # Use an explicit, project-scoped state file so we can wipe it from
          # cPanel File Manager if sync ever desyncs.
          state-name: .ftp-deploy-sync-state-souk.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.next/cache/**
            **/out/**
            **/out.zip
            **/.env
            **/.env.*
            **/.DS_Store
            **/*.docx
            **/*.pdf
            **/*.xlsx
            **/tsconfig.tsbuildinfo

      - name: Trigger Passenger restart
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.github/passenger-restart/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}tmp/
          dangerous-clean-slate: false
          log-level: verbose
          state-name: .ftp-deploy-sync-state-restart.json
